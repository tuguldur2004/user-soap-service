server.port=${PORT:8080}
spring.config.import=optional:file:.env[.properties]

# Auth DB (PostgreSQL, independent DB for SOAP service)
spring.datasource.url=${AUTH_DB_URL:jdbc:postgresql://localhost:5432/auth_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${AUTH_DB_USER:postgres}
spring.datasource.password=${AUTH_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# SOAP servlet mapping
spring.webservices.path=/ws

# JWT
app.jwt.secret=${APP_JWT_SECRET:dev-only-change-me-very-long-random-secret}
app.jwt.expiration-ms=86400000
